<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger — Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo-mark">◈</span>
      <span class="logo-text">Ledger</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="summaryToggle" title="Monthly Summary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>
      <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle Theme">
        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ── BALANCE HERO ────────────────────────────── -->
  <section class="balance-hero">
    <p class="balance-label" id="balanceLabel">Balance</p>
    <h1 class="balance-amount" id="totalBalance">Rp 0</h1>
    <div class="balance-stats">
      <div class="balance-stat">
        <span class="balance-stat-label">Budget</span>
        <span class="balance-stat-value" id="statBudget">—</span>
      </div>
      <div class="balance-stat-divider"></div>
      <div class="balance-stat">
        <span class="balance-stat-label">Spent</span>
        <span class="balance-stat-value" id="statSpent">Rp 0</span>
      </div>
    </div>
    <div class="balance-bar" id="balanceBar">
      <!-- category pills injected by JS -->
    </div>

    <!-- Limit Banner -->
    <div class="limit-banner" id="limitBanner" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="limitMessage">Spending limit reached!</span>
    </div>
  </section>

  <!-- ── MONTHLY SUMMARY PANEL ─────────────────── -->
  <div class="panel summary-panel" id="summaryPanel" style="display:none">
    <div class="panel-header">
      <h2>Monthly Summary</h2>
      <button class="icon-btn" id="summaryClose">✕</button>
    </div>
    <div id="summaryContent" class="summary-grid"></div>
  </div>

  <!-- ── CHART ──────────────────────────────────── -->
  <section class="chart-section">
    <div class="chart-wrap">
      <canvas id="spendingChart"></canvas>
      <div class="chart-center-label" id="chartCenterLabel">
        <span class="chart-center-num">0</span>
        <span class="chart-center-sub">items</span>
      </div>
    </div>
    <div class="chart-legend" id="chartLegend"></div>
  </section>

  <!-- ── ADD TRANSACTION FORM ───────────────────── -->
  <section class="form-section">
    <h2 class="section-title">New Entry</h2>
    <div class="form-card">
      <div class="form-row">
        <div class="field">
          <label for="itemName">Item</label>
          <input type="text" id="itemName" placeholder="e.g. Lunch at Warung" autocomplete="off" />
        </div>
        <div class="field field--sm">
          <label for="itemAmount">Amount (Rp)</label>
          <input type="number" id="itemAmount" placeholder="25000" min="0" />
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="itemCategory">Category</label>
          <select id="itemCategory">
            <!-- options injected by JS -->
          </select>
        </div>
        <div class="field field--sm">
          <label for="spendingBudget">Budget (Rp)</label>
          <input type="number" id="spendingBudget" placeholder="1000000" min="0" />
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="spendingLimit">Spending Limit (Rp)</label>
          <input type="number" id="spendingLimit" placeholder="Optional alert threshold" min="0" />
        </div>
      </div>
      <div class="form-row form-row--actions">
        <button class="btn btn--secondary" id="addCategoryBtn">+ Category</button>
        <button class="btn btn--primary" id="addTransactionBtn">Add Entry</button>
      </div>
      <div class="error-msg" id="formError"></div>
    </div>
  </section>

  <!-- ── TRANSACTION LIST ───────────────────────── -->
  <section class="list-section">
    <div class="list-header">
      <h2 class="section-title">Transactions</h2>
      <div class="sort-controls">
        <label>Sort</label>
        <select id="sortSelect">
          <option value="date-desc">Newest</option>
          <option value="date-asc">Oldest</option>
          <option value="amount-desc">Highest</option>
          <option value="amount-asc">Lowest</option>
          <option value="category">Category</option>
        </select>
      </div>
    </div>
    <div class="transaction-list" id="transactionList">
      <div class="empty-state" id="emptyState">
        <span class="empty-icon">◈</span>
        <p>No entries yet.<br/>Add your first transaction above.</p>
      </div>
    </div>
  </section>

  <!-- ── ADD CATEGORY MODAL ─────────────────────── -->
  <div class="modal-overlay" id="categoryModal" style="display:none">
    <div class="modal">
      <h3>New Category</h3>
      <input type="text" id="newCategoryName" placeholder="Category name" maxlength="20" />
      <div class="modal-actions">
        <button class="btn btn--secondary" id="modalCancel">Cancel</button>
        <button class="btn btn--primary" id="modalConfirm">Add</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
